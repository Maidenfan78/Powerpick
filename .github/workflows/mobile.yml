name: Mobile Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  mobile-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache Yarn
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/yarn          # Yarn’s global cache
            **/node_modules        # project-level installs
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # ── Android credentials ────────────────────────────────────────
      - name: Decode Android keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android.keystore

      - name: Setup Android credentials for CI
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          npx eas credentials:manager -p android --non-interactive \
            --keystore-path android.keystore \
            --keystore-alias "${{ secrets.KEYSTORE_ALIAS }}" \
            --keystore-password "${{ secrets.KEYSTORE_PASSWORD }}" \
            --key-password "${{ secrets.KEY_PASSWORD }}"

      # ── Build & submit ─────────────────────────────────────────────
      - name: EAS Build
        run: yarn eas build --platform android --non-interactive

      - name: Submit to Play Store
        run: yarn eas submit -p android --latest
        env:
          EXPO_GOOGLE_SERVICE_ACCOUNT: ${{ secrets.PLAY_JSON }}
